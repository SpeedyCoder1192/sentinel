name: Multi-Platform Building

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM Linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Cargo for ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' > .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sentinel

  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-mac-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sentinel

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Parses the version string directly out of your Cargo.toml [package] section
      - name: Extract Version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Create Workspace Directory
        run: mkdir -p release-assets

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sentinel-linux-*
          path: release-assets/linux

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sentinel-mac-*
          path: release-assets/mac

      - name: Package and Rename Binaries
        run: |
          cd release-assets
          
          # Package Linux binaries
          mv linux/sentinel-linux-x86_64-unknown-linux-gnu/sentinel ./sentinel-linux-amd64
          mv linux/sentinel-linux-aarch64-unknown-linux-gnu/sentinel ./sentinel-linux-arm64
          tar -czf sentinel-linux-amd64.tar.gz sentinel-linux-amd64
          tar -czf sentinel-linux-arm64.tar.gz sentinel-linux-arm64
          
          # Package macOS binaries
          mv mac/sentinel-mac-x86_64-apple-darwin/sentinel ./sentinel-macos-intel
          mv mac/sentinel-mac-aarch64-apple-darwin/sentinel ./sentinel-macos-apple-silicon
          tar -czf sentinel-macos-intel.tar.gz sentinel-macos-intel
          tar -czf sentinel-macos-apple-silicon.tar.gz sentinel-macos-apple-silicon

      - name: Publish and Tag Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Sentinel ${{ env.VERSION }}"
          body: "Automated binary compilation for version ${{ env.VERSION }}"
          draft: false
          prerelease: false
          files: |
            release-assets/sentinel-linux-amd64.tar.gz
            release-assets/sentinel-linux-arm64.tar.gz
            release-assets/sentinel-macos-intel.tar.gz
            release-assets/sentinel-macos-apple-silicon.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
